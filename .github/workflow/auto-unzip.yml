name: Auto Unzip & Push

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.zip'          # Trigger only when .zip files are added/modified
  workflow_dispatch:     # Allow manual trigger

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for proper git history

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Find and Unzip all ZIP files (preserve structure)
        run: |
          echo "🔍 Finding ZIP files..."
          mapfile -t zip_files < <(find . -type f -name "*.zip" ! -path "./.git/*")

          if [ ${#zip_files[@]} -eq 0 ]; then
            echo "No ZIP files found."
            exit 0
          fi

          echo "Found ${#zip_files[@]} ZIP file(s). Extracting with folder structure..."

          for zip in "${zip_files[@]}"; do
            echo "📦 Extracting: $zip"
            
            # Unzip preserving full folder structure into root
            unzip -o -q "$zip" -d .
            
            echo "✅ Extracted: $zip"
            
            # Optional: Remove the ZIP after successful extraction
            rm -f "$zip"
            echo "🗑️  Removed ZIP: $zip"
          done

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any changes
          if git diff --quiet HEAD --; then
            echo "No changes to commit."
            exit 0
          fi

          git add .
          git commit -m "🤖 Auto-unzip: Extracted ZIP files to repository root"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Auto Unzip & Push

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PAT }}     # ← Use PAT here

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Find and Unzip all ZIP files (preserve structure)
        run: |
          echo "🔍 Finding ZIP files..."
          mapfile -t zip_files < <(find . -type f -name "*.zip" ! -path "./.git/*")

          if [ ${#zip_files[@]} -eq 0 ]; then
            echo "No ZIP files found."
            exit 0
          fi

          for zip in "${zip_files[@]}"; do
            echo "📦 Extracting: $zip"
            unzip -o -q "$zip" -d .
            echo "✅ Extracted: $zip"
            
            rm -f "$zip"          # Remove ZIP after extraction
            echo "🗑️  Removed: $zip"
          done

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet HEAD --; then
            echo "No changes to commit."
            exit 0
          fi

          git add .
          git commit -m "🤖 Auto-unzip: Extracted ZIP files to repository root"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_PAT }}   # ← Use PAT here too

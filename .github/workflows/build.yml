name: Build Nexus Injector

# Triggers the build when you push to main, or manually via the Actions tab
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code using the secret token you created
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      # 2. Auto-Unzip any .zip files in the repository
      - name: Auto-Unzip Uploaded Archives
        run: |
          echo "Scanning repository for .zip files..."
          find . -name "*.zip" -type f -exec sh -c '
            dir="${1%.*}"
            echo "Extracting: $1 to $dir"
            mkdir -p "$dir"
            unzip -o -d "$dir" "$1"
            rm "$1"
          ' _ {} \;
          echo "Extraction complete."

      # 3. Setup the Java environment required by Android
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Setup Gradle and enforce version 8.7 for AGP 8.2 compatibility
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          
      # 5. Compile the app using the global Gradle installation
      - name: Build with Gradle
        run: gradle assembleDebug

      # 6. Grab the finished APK and upload it so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Payload-Injector-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

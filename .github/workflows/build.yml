name: Build Nexus Injector

# Triggers the build when you push to main, or manually via the Actions tab
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code using the secret token you created
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      # 2. Auto-Unzip any .zip files in the repository
      # This finds all zips, extracts them into folders of the same name, and deletes the original zip
      - name: Auto-Unzip Uploaded Archives
        run: |
          echo "Scanning repository for .zip files..."
          find . -name "*.zip" -type f -exec sh -c '
            dir="${1%.*}"
            echo "Extracting: $1 to $dir"
            mkdir -p "$dir"
            unzip -o -d "$dir" "$1"
            rm "$1"
          ' _ {} \;
          echo "Extraction complete."

      # 3. Setup the Java environment required by Android
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Ensure the Gradle wrapper has execution permissions
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Compile the app using Gradle
      - name: Build with Gradle
        run: gradle assembleDebug

      # 6. Grab the finished APK and upload it so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Payload-Injector-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
